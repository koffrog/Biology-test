<!DOCTYPE html>
<html lang="kk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biology Test</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>🧬 Biology Test</h1>

<p>Биология емтиханына дайындық</p>



<!-- ГЛАВНОЕ МЕНЮ -->

<div class="menu" id="menu">


<button onclick="startTest()">
📝 Тест бастау
</button>


<button onclick="showErrors()">
❌ Менің қателерім
</button>


<button onclick="showFavorites()">
⭐ Таңдаулы сұрақтар
</button>


</div>





<!-- НАСТРОЙКИ -->


<div class="settings" id="settings">


<label>
Тақырыпты таңда:
</label>


<select id="topic">


<option value="all">
Барлық тақырыптар
</option>


<option value="Анатомия">
🫀 Анатомия
</option>


<option value="Генетика">
🧬 Генетика
</option>


<option value="Ботаника">
🌱 Ботаника
</option>


<option value="Цитология">
🔬 Цитология
</option>


<option value="Экология">
🌍 Экология
</option>


</select>


</div>






<!-- ТЕСТ -->


<div id="test" class="hidden">


<div class="top">


<span id="progress">
0/100
</span>


<span id="score">
Дұрыс: 0
</span>


</div>




<div class="question-box">


<h2 id="question">
</h2>


<div id="answers">
</div>



<div id="explanation">
</div>


</div>




<button id="next"
onclick="nextQuestion()">

Келесі сұрақ →

</button>



</div>








<!-- РЕЗУЛЬТАТ -->


<div id="result" class="hidden">


<h2>
🎉 Нәтиже
</h2>


<p id="resultText">

</p>


<button onclick="startTest()">

Қайта бастау

</button>



<button onclick="location.reload()">

Басты бет

</button>



</div>








<!-- ОШИБКИ -->


<div id="errorPage" class="hidden">


<h2>
❌ Менің қателерім
</h2>


<div id="errorList">

</div>


<button onclick="location.reload()">

Артқа

</button>


</div>








<!-- ИЗБРАННОЕ -->


<div id="favoritePage" class="hidden">


<h2>
⭐ Таңдаулы сұрақтар
</h2>


<div id="favoriteList">

</div>



<button onclick="location.reload()">

Артқа

</button>


</div>






</div>



<script src="questions.js"></script>

<script src="script.js"></script>


</body>


</html>
