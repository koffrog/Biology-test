<!DOCTYPE html>
<html lang="kk">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biology Test</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>🧬 Biology Test</h1>

<p>Биология емтиханына дайындық</p>



<!-- Главное меню -->

<div class="menu" id="menu">


<button onclick="startTest()">
📝 Тест бастау
</button>


<button onclick="showErrors()">
❌ Менің қателерім
</button>


<button onclick="showFavorites()">
⭐ Таңдаулы сұрақтар
</button>


</div>





<!-- Настройки -->

<div class="settings" id="settings">


<h3>Тест режимі</h3>


<p>
100 сұрақ кездейсоқ беріледі
</p>


</div>






<!-- Тест -->


<div id="test" class="hidden">


<div class="top">


<span id="progress">
0/100
</span>


<span id="score">
Дұрыс: 0
</span>


</div>




<div class="question-box">


<h2 id="question">

</h2>



<div id="answers">

</div>



<div id="explanation">

</div>


</div>





<button id="next" onclick="nextQuestion()">

Келесі сұрақ →

</button>



</div>









<!-- Результат -->


<div id="result" class="hidden">


<h2>
🎉 Тест аяқталды!
</h2>



<p id="resultText">

</p>



<button onclick="startTest()">

Қайта бастау

</button>



<button onclick="location.reload()">

Басты бет

</button>


</div>








</div>



<script src="questions.js"></script>

<script src="script.js"></script>


</body>

</html>
